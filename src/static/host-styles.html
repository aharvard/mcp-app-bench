<!doctype html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Victor+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{BASE_URL}}/shell/shell.css?v={{CACHE_HASH}}"
    />
    <meta name="color-scheme" content="light dark" />
    <style>
      body {
        padding: 0;
        background: var(--color-background-primary, var(--bg-primary));
        color: var(--color-text-primary, var(--text-primary));
        font-family: var(
          --font-sans,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif
        );
      }

      html {
        overflow: hidden;
      }

      body {
        overflow: visible;
      }

      body.display-mode-fullscreen,
      body.display-mode-pip {
        height: auto;
        overflow-y: auto;
        display: block;
      }

      body.display-mode-fullscreen .app-content.is-ready {
        display: block;
      }

      .app-content.is-ready {
        display: block;
      }

      .style-inspector {
        max-width: 1120px;
        margin: 0 auto;
        padding: 1.75rem 1.75rem 4rem;
      }

      .style-page-header {
        margin-bottom: 0.75rem;
      }

      .style-page-kicker {
        display: inline-flex;
        align-items: center;
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--color-text-secondary, var(--text-secondary));
      }

      .style-section {
        border-top: 1px solid var(--color-border-primary, var(--border));
        padding-top: 1.5rem;
        margin-top: 1.5rem;
      }

      .style-section-hero {
        max-width: 760px;
        margin-bottom: 2.75rem;
      }

      .style-section-title {
        margin: 0 0 0.625rem;
        font-size: clamp(2.75rem, 4vw, 3.625rem);
        line-height: 1.02;
        letter-spacing: -0.04em;
        font-weight: var(--font-weight-bold, 700);
        color: var(--color-text-primary, var(--text-primary));
      }

      .style-section-description {
        margin: 0;
        max-width: 620px;
        font-size: 1.05rem;
        line-height: 1.5;
        color: var(--color-text-secondary, var(--text-secondary));
      }

      .style-subsection {
        border-top: 1px solid var(--color-border-primary, var(--border));
        padding-top: 1.25rem;
        margin-top: 1.75rem;
      }

      .style-subsection-title {
        margin: 0 0 1.25rem;
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--color-text-secondary, var(--text-secondary));
      }

      .token-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1.5rem 2rem;
      }

      .token-list {
        display: flex;
        flex-direction: column;
      }

      .token-row {
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr);
        gap: 0.875rem;
        align-items: start;
        padding: 0.0625rem 0 0.875rem;
      }

      .token-row + .token-row {
        padding-top: 0.875rem;
        border-top: 1px solid
          color-mix(
            in srgb,
            var(--color-border-primary, var(--border)) 78%,
            transparent
          );
      }

      .token-swatch {
        width: 48px;
        height: 48px;
        border: 1px solid
          color-mix(
            in srgb,
            var(--color-border-primary, var(--border)) 84%,
            transparent
          );
        background: var(--color-background-primary, var(--bg-primary));
      }

      .token-copy {
        min-width: 0;
      }

      .token-name {
        margin: 0 0 0.125rem;
        font-size: 1rem;
        line-height: 1.35;
        font-weight: var(--font-weight-semibold, 600);
        color: var(--color-text-primary, var(--text-primary));
      }

      .token-var,
      .token-value {
        display: block;
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.78rem;
        line-height: 1.55;
      }

      .token-var {
        color: var(--color-text-secondary, var(--text-secondary));
      }

      .token-value {
        margin-top: 0.125rem;
        color: var(--color-text-primary, var(--text-primary));
      }

      .family-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 2.5rem;
      }

      .family-card-label {
        margin: 0 0 0.75rem;
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-text-secondary, var(--text-secondary));
      }

      .family-card-sample {
        margin: 0 0 0.75rem;
        color: var(--color-text-primary, var(--text-primary));
      }

      .family-card-sample.is-sans {
        font-size: clamp(1.75rem, 2.6vw, 2.4rem);
        line-height: 1.2;
      }

      .family-card-sample.is-mono {
        font-size: clamp(1.3rem, 2vw, 1.8rem);
        line-height: 1.35;
      }

      .family-card-value {
        margin: 0;
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.8rem;
        line-height: 1.6;
        color: var(--color-text-secondary, var(--text-secondary));
        word-break: break-word;
      }

      .weight-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1.5rem;
      }

      .weight-card-title {
        margin: 0 0 0.25rem;
        font-size: 1.9rem;
        line-height: 1.1;
        color: var(--color-text-primary, var(--text-primary));
      }

      .weight-card-value {
        margin: 0;
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.82rem;
        color: var(--color-text-secondary, var(--text-secondary));
      }

      .scale-list {
        display: flex;
        flex-direction: column;
      }

      .scale-row {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 1.5rem;
        align-items: center;
        padding: 0.875rem 0;
        border-bottom: 1px solid
          color-mix(
            in srgb,
            var(--color-border-primary, var(--border)) 78%,
            transparent
          );
      }

      .scale-row:last-child {
        border-bottom: none;
      }

      .scale-meta-label {
        margin: 0 0 0.2rem;
        font-size: 0.95rem;
        font-weight: var(--font-weight-semibold, 600);
        color: var(--color-text-primary, var(--text-primary));
      }

      .scale-meta-size {
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.8rem;
        color: var(--color-text-secondary, var(--text-secondary));
      }

      .scale-preview {
        min-width: 0;
        color: var(--color-text-primary, var(--text-primary));
      }

      .radius-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
        gap: 1.25rem 1rem;
        justify-items: center;
      }

      .radius-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 100%;
        max-width: 108px;
      }

      .radius-card-preview {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        margin-bottom: 0.75rem;
        border: 1px solid
          color-mix(
            in srgb,
            var(--color-border-primary, var(--border)) 84%,
            transparent
          );
        background: linear-gradient(
          180deg,
          color-mix(
              in srgb,
              var(--color-background-secondary, var(--bg-terminal)) 92%,
              transparent
            )
            0%,
          color-mix(
              in srgb,
              var(--color-background-primary, var(--bg-primary)) 96%,
              transparent
            )
            100%
        );
        color: var(--color-text-secondary, var(--text-secondary));
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.82rem;
      }

      .radius-card-label {
        margin: 0 0 0.2rem;
        font-size: 0.9rem;
        font-weight: var(--font-weight-semibold, 600);
      }

      .radius-card-var {
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.72rem;
        line-height: 1.45;
        color: var(--color-text-secondary, var(--text-secondary));
        word-break: break-word;
      }

      .border-width-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .border-width-row {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 1.75rem;
        align-items: center;
      }

      .border-width-copy {
        min-width: 0;
      }

      .border-width-label {
        margin: 0 0 0.2rem;
        font-size: 0.95rem;
        font-weight: var(--font-weight-semibold, 600);
      }

      .border-width-var,
      .border-width-value {
        display: block;
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.78rem;
        line-height: 1.5;
      }

      .border-width-var {
        color: var(--color-text-secondary, var(--text-secondary));
      }

      .border-width-value {
        color: var(--color-text-primary, var(--text-primary));
      }

      .border-width-preview {
        padding: 1.5rem;
        background: linear-gradient(
          180deg,
          color-mix(
              in srgb,
              var(--color-background-secondary, var(--bg-terminal)) 90%,
              transparent
            )
            0%,
          color-mix(
              in srgb,
              var(--color-background-primary, var(--bg-primary)) 98%,
              transparent
            )
            100%
        );
        color: var(--color-text-secondary, var(--text-secondary));
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .shadow-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
        gap: 1.25rem;
        justify-items: center;
      }

      .shadow-card {
        width: 100%;
        max-width: 220px;
      }

      .shadow-card-surface {
        width: 100%;
        height: 116px;
        margin-bottom: 0.75rem;
        background: var(--color-background-primary, var(--bg-primary));
        border: 1px solid
          color-mix(
            in srgb,
            var(--color-border-primary, var(--border)) 68%,
            transparent
          );
      }

      .shadow-card-copy {
        min-width: 0;
      }

      .shadow-card-name {
        margin: 0 0 0.2rem;
        font-size: 0.95rem;
        font-weight: var(--font-weight-semibold, 600);
      }

      .shadow-card-var,
      .shadow-card-value {
        display: block;
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.78rem;
        line-height: 1.5;
        word-break: break-word;
      }

      .shadow-card-var {
        color: var(--color-text-secondary, var(--text-secondary));
      }

      .shadow-card-value {
        color: var(--color-text-primary, var(--text-primary));
      }

      .css-fallbacks-block {
        margin: 0;
        padding: 1.25rem;
        border: 1px solid
          color-mix(
            in srgb,
            var(--color-border-primary, var(--border)) 84%,
            transparent
          );
        background: linear-gradient(
          180deg,
          color-mix(
              in srgb,
              var(--color-background-secondary, var(--bg-terminal)) 94%,
              transparent
            )
            0%,
          color-mix(
              in srgb,
              var(--color-background-primary, var(--bg-primary)) 98%,
              transparent
            )
            100%
        );
        font-family: var(--font-mono, "Victor Mono", ui-monospace, monospace);
        font-size: 0.78rem;
        line-height: 1.7;
        color: var(--color-text-secondary, var(--text-secondary));
        white-space: pre-wrap;
        word-break: break-word;
        overflow-x: auto;
      }

      .style-value-probe {
        position: fixed;
        left: -9999px;
        top: -9999px;
        width: 0;
        height: 0;
        visibility: hidden;
        pointer-events: none;
      }

      @media (max-width: 960px) {
        .token-grid,
        .family-grid,
        .weight-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .token-grid {
          gap: 1.25rem 1.25rem;
        }
      }

      @media (max-width: 720px) {
        .style-inspector {
          padding: 1.25rem 1rem 3rem;
        }

        .family-grid,
        .weight-grid,
        .scale-row,
        .border-width-row {
          grid-template-columns: 1fr;
        }

        .token-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 1rem;
        }

        .token-row {
          grid-template-columns: 40px minmax(0, 1fr);
          gap: 0.75rem;
        }

        .token-swatch {
          width: 40px;
          height: 40px;
        }

        .scale-row,
        .border-width-row {
          gap: 0.75rem;
        }

        .style-section-title {
          font-size: clamp(2.35rem, 10vw, 3rem);
        }
      }

      @media (max-width: 560px) {
        .token-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loading" class="app-loading">
      <div class="app-loading-spinner"></div>
      <div class="app-loading-text">Waiting for tool result...</div>
    </div>

    <div id="app-content" class="app-content">
      <div class="style-inspector">
        <div id="host-styles-content">
          <div class="styles-empty">Waiting for host styles...</div>
        </div>
      </div>

      <div id="inspector-footer" class="inspector-footer"></div>
    </div>

    <script src="{{BASE_URL}}/shell/shell.js?v={{CACHE_HASH}}"></script>
    <script>
      ;(function () {
        "use strict"

        var esc = MCPAppShell.escapeHtml
        var hostTheme = MCPAppShell.getTheme()
        var styleProbe = null

        var COLOR_ORDER = {
          background: [
            "--color-background-primary",
            "--color-background-secondary",
            "--color-background-tertiary",
            "--color-background-inverse",
            "--color-background-ghost",
            "--color-background-info",
            "--color-background-danger",
            "--color-background-success",
            "--color-background-warning",
            "--color-background-disabled",
          ],
          text: [
            "--color-text-primary",
            "--color-text-secondary",
            "--color-text-tertiary",
            "--color-text-inverse",
            "--color-text-info",
            "--color-text-danger",
            "--color-text-success",
            "--color-text-warning",
            "--color-text-disabled",
            "--color-text-ghost",
          ],
          border: [
            "--color-border-primary",
            "--color-border-secondary",
            "--color-border-tertiary",
            "--color-border-inverse",
            "--color-border-ghost",
            "--color-border-info",
            "--color-border-danger",
            "--color-border-success",
            "--color-border-warning",
            "--color-border-disabled",
          ],
          ring: [
            "--color-ring-primary",
            "--color-ring-secondary",
            "--color-ring-inverse",
            "--color-ring-info",
            "--color-ring-danger",
            "--color-ring-success",
            "--color-ring-warning",
          ],
        }

        var RADIUS_ORDER = [
          "--border-radius-xs",
          "--border-radius-sm",
          "--border-radius-md",
          "--border-radius-lg",
          "--border-radius-xl",
          "--border-radius-full",
        ]

        var WIDTH_ORDER = ["--border-width-regular"]

        var SHADOW_ORDER = [
          "--shadow-hairline",
          "--shadow-sm",
          "--shadow-md",
          "--shadow-lg",
        ]

        var WEIGHT_ORDER = [
          "--font-weight-normal",
          "--font-weight-medium",
          "--font-weight-semibold",
          "--font-weight-bold",
        ]

        var SCALE_ORDER = {
          heading: ["3xl", "2xl", "xl", "lg", "md", "sm", "xs"],
          text: ["lg", "md", "sm", "xs"],
        }

        function syncHostTheme() {
          MCPAppShell.setTheme(hostTheme)
          document.documentElement.style.colorScheme = hostTheme
        }

        function getStyleProbe() {
          if (!styleProbe) {
            styleProbe = document.createElement("div")
            styleProbe.className = "style-value-probe"
            document.body.appendChild(styleProbe)
          }
          return styleProbe
        }

        function resolveTokenCssValue(varName, propertyName) {
          var probe = getStyleProbe()
          probe.style.cssText = ""

          if (
            propertyName === "borderTopColor" ||
            propertyName === "borderTopWidth"
          ) {
            probe.style.borderTopStyle = "solid"
          }

          if (propertyName === "outlineColor") {
            probe.style.outlineStyle = "solid"
            probe.style.outlineWidth = "1px"
          }

          probe.style[propertyName] = "var(" + varName + ")"

          var computed = window.getComputedStyle(probe)[propertyName]
          return computed ? computed.trim() : ""
        }

        function sortVars(vars, order) {
          var orderIndex = {}
          for (var i = 0; i < order.length; i++) {
            orderIndex[order[i]] = i
          }

          return (vars || []).slice().sort(function (a, b) {
            var aIndex = orderIndex[a[0]] !== undefined ? orderIndex[a[0]] : 999
            var bIndex = orderIndex[b[0]] !== undefined ? orderIndex[b[0]] : 999

            if (aIndex !== bIndex) return aIndex - bIndex
            return a[0].localeCompare(b[0])
          })
        }

        function titleCase(word) {
          if (!word) return ""
          return word.charAt(0).toUpperCase() + word.slice(1)
        }

        function scaleCase(word) {
          return String(word || "").toUpperCase()
        }

        function tokenSuffix(varName, prefix) {
          return varName.indexOf(prefix) === 0
            ? varName.slice(prefix.length)
            : varName
        }

        function semanticTitle(varName, prefix, familyName) {
          var parts = tokenSuffix(varName, prefix).split("-")
          var labels = []

          for (var i = 0; i < parts.length; i++) {
            labels.push(titleCase(parts[i]))
          }

          return familyName + " / " + labels.join(" ")
        }

        function weightLabel(varName) {
          return titleCase(tokenSuffix(varName, "--font-weight-"))
        }

        function radiusLabel(varName) {
          return scaleCase(tokenSuffix(varName, "--border-radius-"))
        }

        function familyLabel(varName) {
          return varName === "--font-mono" ? "Mono" : "Sans"
        }

        function shadowLabel(varName) {
          return "Shadow / " + titleCase(tokenSuffix(varName, "--shadow-"))
        }

        function sizeLabel(prefix, key) {
          return prefix + " " + scaleCase(key)
        }

        function renderPageHeader() {
          return (
            '<div class="style-page-header">' +
            '<div class="style-page-kicker">' +
            "<span>" +
            esc(titleCase(hostTheme)) +
            "</span>" +
            "</div>" +
            "</div>"
          )
        }

        function renderSection(title, description, content) {
          return (
            '<section class="style-section">' +
            '<div class="style-section-hero">' +
            '<h2 class="style-section-title">' +
            esc(title) +
            "</h2>" +
            '<p class="style-section-description">' +
            esc(description) +
            "</p>" +
            "</div>" +
            content +
            "</section>"
          )
        }

        function renderSubsection(title, content) {
          return (
            '<div class="style-subsection">' +
            '<h3 class="style-subsection-title">' +
            esc(title) +
            "</h3>" +
            content +
            "</div>"
          )
        }

        function renderColorTokens(vars, order, prefix, familyName) {
          var ordered = sortVars(vars, order)
          if (!ordered.length) return ""

          var columns = [[], []]
          for (var i = 0; i < ordered.length; i++) {
            columns[i % 2].push(ordered[i])
          }

          var html = '<div class="token-grid">'

          for (var c = 0; c < columns.length; c++) {
            html += '<div class="token-list">'
            for (var j = 0; j < columns[c].length; j++) {
              var item = columns[c][j]
              var varName = item[0]
              var value =
                resolveTokenCssValue(varName, "backgroundColor") || item[1]

              html += '<div class="token-row">'
              html +=
                '<div class="token-swatch" style="background: var(' +
                esc(varName) +
                ');"></div>'
              html += '<div class="token-copy">'
              html +=
                '<div class="token-name">' +
                esc(semanticTitle(varName, prefix, familyName)) +
                "</div>"
              html += '<code class="token-var">' + esc(varName) + "</code>"
              html += '<span class="token-value">' + esc(value) + "</span>"
              html += "</div>"
              html += "</div>"
            }
            html += "</div>"
          }

          html += "</div>"
          return html
        }

        function renderColorSection(categories) {
          var content = ""

          if (
            categories["Background Colors"] &&
            categories["Background Colors"].length
          ) {
            content += renderSubsection(
              "Background",
              renderColorTokens(
                categories["Background Colors"],
                COLOR_ORDER.background,
                "--color-background-",
                "Background"
              )
            )
          }

          if (categories["Text Colors"] && categories["Text Colors"].length) {
            content += renderSubsection(
              "Text",
              renderColorTokens(
                categories["Text Colors"],
                COLOR_ORDER.text,
                "--color-text-",
                "Text"
              )
            )
          }

          if (
            categories["Border Colors"] &&
            categories["Border Colors"].length
          ) {
            content += renderSubsection(
              "Border",
              renderColorTokens(
                categories["Border Colors"],
                COLOR_ORDER.border,
                "--color-border-",
                "Border"
              )
            )
          }

          if (categories["Ring Colors"] && categories["Ring Colors"].length) {
            content += renderSubsection(
              "Ring",
              renderColorTokens(
                categories["Ring Colors"],
                COLOR_ORDER.ring,
                "--color-ring-",
                "Ring"
              )
            )
          }

          if (!content) return ""

          return renderSection(
            "Color",
            "Semantic tokens for background, text, border, and ring values as exposed by the active host style.",
            content
          )
        }

        function renderFontFamilies(vars) {
          var ordered = sortVars(vars || [], ["--font-sans", "--font-mono"])
          if (!ordered.length) return ""

          var html = '<div class="family-grid">'

          for (var i = 0; i < ordered.length; i++) {
            var varName = ordered[i][0]
            var value = ordered[i][1]
            var mono = varName === "--font-mono"
            var sample = mono
              ? "const total = subtotal + tax - discount"
              : "The quick brown fox jumps over the lazy dog"

            html += '<div class="family-card">'
            html +=
              '<div class="family-card-label">' +
              esc(familyLabel(varName)) +
              "</div>"
            html +=
              '<p class="family-card-sample ' +
              (mono ? "is-mono" : "is-sans") +
              '" style="font-family: var(' +
              esc(varName) +
              ');">' +
              esc(sample) +
              "</p>"
            html += '<p class="family-card-value">' + esc(value) + "</p>"
            html += "</div>"
          }

          html += "</div>"
          return html
        }

        function renderFontWeights(vars) {
          var ordered = sortVars(vars || [], WEIGHT_ORDER)
          if (!ordered.length) return ""

          var html = '<div class="weight-grid">'

          for (var i = 0; i < ordered.length; i++) {
            var varName = ordered[i][0]
            var value =
              resolveTokenCssValue(varName, "fontWeight") || ordered[i][1]

            html += '<div class="weight-card">'
            html +=
              '<p class="weight-card-title" style="font-weight: var(' +
              esc(varName) +
              ');">' +
              esc(weightLabel(varName)) +
              "</p>"
            html += '<p class="weight-card-value">' + esc(value) + "</p>"
            html += "</div>"
          }

          html += "</div>"
          return html
        }

        function collectScaleEntries(vars, prefix) {
          var grouped = {}
          var pattern =
            prefix === "heading"
              ? /^--font-heading-([a-z0-9]+)-(size|line-height)$/
              : /^--font-text-([a-z0-9]+)-(size|line-height)$/

          for (var i = 0; i < vars.length; i++) {
            var varName = vars[i][0]
            var value = vars[i][1]
            var match = varName.match(pattern)

            if (!match) continue

            var key = match[1]
            var field = match[2]

            if (!grouped[key]) {
              grouped[key] = {}
            }

            grouped[key][field] = {
              varName: varName,
              value: value,
            }
          }

          var entries = []
          var order = SCALE_ORDER[prefix]

          for (var j = 0; j < order.length; j++) {
            var item = grouped[order[j]]
            if (item && item.size) {
              entries.push({
                key: order[j],
                size: item.size,
                lineHeight: item["line-height"] || null,
              })
            }
          }

          return entries
        }

        function renderScaleRows(vars, prefix) {
          var entries = collectScaleEntries(vars || [], prefix)
          if (!entries.length) return ""

          var sample =
            prefix === "heading"
              ? "Host-driven heading rhythm"
              : "This body sample helps us see readable spacing and paragraph color."
          var fontWeight =
            prefix === "heading"
              ? "var(--font-weight-bold, 700)"
              : "var(--font-weight-normal, 400)"

          var html = '<div class="scale-list">'

          for (var i = 0; i < entries.length; i++) {
            var entry = entries[i]
            var sizeValue =
              resolveTokenCssValue(entry.size.varName, "fontSize") ||
              entry.size.value
            var previewStyle =
              "font-family: var(--font-sans); font-size: var(" +
              entry.size.varName +
              "); font-weight: " +
              fontWeight +
              ";"

            if (entry.lineHeight) {
              previewStyle +=
                " line-height: var(" + entry.lineHeight.varName + ");"
            }

            html += '<div class="scale-row">'
            html += '<div class="scale-meta">'
            html +=
              '<div class="scale-meta-label">' +
              esc(
                sizeLabel(prefix === "heading" ? "Heading" : "Text", entry.key)
              ) +
              "</div>"
            html += '<div class="scale-meta-size">' + esc(sizeValue) + "</div>"
            html += "</div>"
            html +=
              '<div class="scale-preview" style="' +
              previewStyle +
              '">' +
              esc(sample) +
              "</div>"
            html += "</div>"
          }

          html += "</div>"
          return html
        }

        function renderTypographySection(categories) {
          var content = ""

          if (
            categories["Font Families"] &&
            categories["Font Families"].length
          ) {
            content += renderSubsection(
              "Families",
              renderFontFamilies(categories["Font Families"])
            )
          }

          if (categories["Font Weights"] && categories["Font Weights"].length) {
            content += renderSubsection(
              "Weights",
              renderFontWeights(categories["Font Weights"])
            )
          }

          if (
            categories["Heading Styles"] &&
            categories["Heading Styles"].length
          ) {
            content += renderSubsection(
              "Heading Scale",
              renderScaleRows(categories["Heading Styles"], "heading")
            )
          }

          if (categories["Text Styles"] && categories["Text Styles"].length) {
            content += renderSubsection(
              "Text Scale",
              renderScaleRows(categories["Text Styles"], "text")
            )
          }

          if (!content) return ""

          return renderSection(
            "Typography",
            "The type scale, families, and weights driven by the active host preset.",
            content
          )
        }

        function renderRadiusGrid(vars) {
          var ordered = sortVars(vars || [], RADIUS_ORDER)
          if (!ordered.length) return ""

          var html = '<div class="radius-grid">'

          for (var i = 0; i < ordered.length; i++) {
            var varName = ordered[i][0]
            var value =
              resolveTokenCssValue(varName, "borderTopLeftRadius") ||
              ordered[i][1]

            html += '<div class="radius-card">'
            html +=
              '<div class="radius-card-preview" style="border-radius: var(' +
              esc(varName) +
              ');">' +
              esc(value) +
              "</div>"
            html +=
              '<div class="radius-card-label">' +
              esc(radiusLabel(varName)) +
              "</div>"
            html += '<div class="radius-card-var">' + esc(varName) + "</div>"
            html += "</div>"
          }

          html += "</div>"
          return html
        }

        function renderBorderWidths(vars) {
          var ordered = sortVars(vars || [], WIDTH_ORDER)
          if (!ordered.length) return ""

          var html = '<div class="border-width-list">'

          for (var i = 0; i < ordered.length; i++) {
            var varName = ordered[i][0]
            var value =
              resolveTokenCssValue(varName, "borderTopWidth") || ordered[i][1]

            html += '<div class="border-width-row">'
            html += '<div class="border-width-copy">'
            html += '<div class="border-width-label">Regular</div>'
            html += '<code class="border-width-var">' + esc(varName) + "</code>"
            html += '<span class="border-width-value">' + esc(value) + "</span>"
            html += "</div>"
            html +=
              '<div class="border-width-preview" style="border: var(' +
              esc(varName) +
              ') solid var(--color-border-primary, var(--border));">Card borders, divider lines, and focus shells inherit this token.</div>'
            html += "</div>"
          }

          html += "</div>"
          return html
        }

        function renderStructureSection(categories) {
          var radiusVars = []
          var widthVars = []
          var vars = categories["Border Radius"] || []

          for (var i = 0; i < vars.length; i++) {
            if (vars[i][0].indexOf("--border-width-") === 0) {
              widthVars.push(vars[i])
            } else {
              radiusVars.push(vars[i])
            }
          }

          var content = ""

          if (radiusVars.length) {
            content += renderSubsection(
              "Border Radius",
              renderRadiusGrid(radiusVars)
            )
          }

          if (widthVars.length) {
            content += renderSubsection(
              "Border Width",
              renderBorderWidths(widthVars)
            )
          }

          if (!content) return ""

          return renderSection(
            "Structure",
            "Geometric tokens that control component shape — radii and border widths.",
            content
          )
        }

        function renderShadowSection(categories) {
          var ordered = sortVars(categories["Shadows"] || [], SHADOW_ORDER)
          if (!ordered.length) return ""

          var grid = '<div class="shadow-grid">'

          for (var i = 0; i < ordered.length; i++) {
            var varName = ordered[i][0]
            var value =
              resolveTokenCssValue(varName, "boxShadow") || ordered[i][1]

            grid += '<div class="shadow-card">'
            grid +=
              '<div class="shadow-card-surface" style="box-shadow: var(' +
              esc(varName) +
              ');"></div>'
            grid += '<div class="shadow-card-copy">'
            grid +=
              '<div class="shadow-card-name">' +
              esc(shadowLabel(varName)) +
              "</div>"
            grid += '<code class="shadow-card-var">' + esc(varName) + "</code>"
            grid += '<span class="shadow-card-value">' + esc(value) + "</span>"
            grid += "</div>"
            grid += "</div>"
          }

          grid += "</div>"

          return renderSection(
            "Shadows",
            "Elevation tokens rendered as live surfaces — from hairline to large.",
            renderSubsection("Elevation Scale", grid)
          )
        }

        function renderCssFallbacksSection(styles) {
          if (!styles.css || !styles.css.fonts) return ""

          return renderSection(
            "CSS Fallbacks",
            "Host-provided font fallback CSS emitted alongside the token set.",
            renderSubsection(
              "Font CSS",
              '<pre class="css-fallbacks-block">' +
                esc(styles.css.fonts) +
                "</pre>"
            )
          )
        }

        function renderHostStyles() {
          var container = document.getElementById("host-styles-content")
          var hostInfo = MCPAppShell.getHostInfo()
          var styles =
            hostInfo && hostInfo.hostContext
              ? hostInfo.hostContext.styles
              : null

          if (!container) return

          syncHostTheme()

          if (
            !styles ||
            !styles.variables ||
            Object.keys(styles.variables).length === 0
          ) {
            container.innerHTML =
              '<div class="styles-empty">No styles provided by host</div>'
            MCPAppShell.sendSizeChanged()
            return
          }

          MCPAppShell.injectStyleVariables(styles.variables)

          var categories = MCPAppShell.categorizeStyleVariables(
            styles.variables
          )
          var html = ""

          html += renderPageHeader()
          html += renderColorSection(categories)
          html += renderTypographySection(categories)
          html += renderStructureSection(categories)
          html += renderShadowSection(categories)
          html += renderCssFallbacksSection(styles)

          container.innerHTML = html
          MCPAppShell.sendSizeChanged()
        }

        MCPAppShell.initialize({
          title: "Host Styles",
          clientName: "Host Styles Inspector",
          clientVersion: "1.0.0",
          onInitialized: function (result) {
            if (result.hostContext && result.hostContext.theme) {
              hostTheme = result.hostContext.theme
            }
            syncHostTheme()
          },
        })

        window.addEventListener("mcp-tool-result", function () {
          MCPAppShell.setupInspectorFooter("inspect-host-styles")
          renderHostStyles()
        })

        window.addEventListener("mcp-host-context-changed", function (e) {
          if (!MCPAppShell.isReady()) return

          if (e.detail && e.detail.theme) {
            hostTheme = e.detail.theme
          }

          syncHostTheme()
          renderHostStyles()
        })
      })()
    </script>
  </body>
</html>
